name: Supabase Keep-Alive

on:
  schedule:
    - cron: "0 10 * * *" # Daily at 10:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  ping:
    name: Ping Supabase DB
    runs-on: ubuntu-latest
    steps:
      - name: Keep-alive — 25 read requests
        run: |
          BASE="${{ secrets.SUPABASE_URL }}/rest/v1/members"
          KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          for i in $(seq 1 25); do
            curl -f -s \
              "${BASE}?select=id,full_name&limit=2&offset=$((i * 2))" \
              -H "apikey: ${KEY}" \
              -H "Authorization: Bearer ${KEY}" \
              > /dev/null
            sleep 1
          done
          echo "✅ 25 keep-alive requests completed"
